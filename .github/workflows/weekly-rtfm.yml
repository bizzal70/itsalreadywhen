name: Weekly RTFM

on:
  schedule:
    - cron: '0 14 * * 3'  # 8 AM MDT (UTC-6) every Wednesday
  workflow_dispatch:

jobs:
  rtfm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Generate RTFM article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/rtfm.py

      - name: Push new RTFM article
        id: push
        run: |
          git config user.name "itsalreadywhen-bot"
          git config user.email "actions@github.com"
          git add _rtfm/ scraper/rtfm_topics.yml
          if git diff --staged --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "RTFM $(date +'%Y-%m-%d')"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for page to go live
        if: steps.push.outputs.published == 'true'
        run: |
          URL=$(python -c "
          import re, glob
          from pathlib import Path
          articles = sorted(glob.glob('_rtfm/*.md'), reverse=True)
          p = Path(articles[0])
          content = p.read_text()
          date = re.search(r'date:\s*(\d{4}-\d{2}-\d{2})', content).group(1)
          slug = re.sub(r'^\d{4}-\d{2}-\d{2}-', '', p.stem)
          print(f'https://bizzal70.github.io/itsalreadywhen/rtfm/{date.replace(\"-\", \"/\")}/{slug}/')
          ")
          echo "Waiting for $URL"
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$status" = "200" ]; then
              echo "Page is live (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $status, waiting 10s..."
            sleep 10
          done
          echo "Page did not go live after 5 minutes — aborting tweet"
          exit 1

      - name: Post to X
        if: steps.push.outputs.published == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scraper/post_rtfm_to_x.py
