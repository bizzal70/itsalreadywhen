name: Daily Field Note

on:
  schedule:
    - cron: '30 12 * * *'  # 6:30 AM MDT (UTC-6), after the daily scrape
  workflow_dispatch:

jobs:
  field-note:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: scraper/articles.db
          key: articles-db-${{ github.run_id }}
          restore-keys: articles-db-

      - name: Generate Field Note
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/field_note.py

      - name: Push new Field Note
        id: push
        run: |
          git config user.name "itsalreadywhen-bot"
          git config user.email "actions@github.com"
          git add _field_notes/
          if git diff --staged --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Field Note $(date +'%Y-%m-%d')"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to X
        if: steps.push.outputs.published == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scraper/post_field_note_to_x.py
