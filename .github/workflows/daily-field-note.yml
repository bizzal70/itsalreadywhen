name: Daily Field Note

on:
  schedule:
    # Two daily attempts ~an hour apart. No timezone/DST guard anymore: the
    # first run each day publishes; any later run sees today's note already
    # exists and no-ops (see the idempotency gate below). This makes it
    # impossible to silently drop a day if GitHub's scheduler is late or a
    # run fails -- the second trigger is a built-in catch-up.
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  field-note:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Idempotency gate (one Field Note per day)
        id: gate
        run: |
          day=$(TZ='America/Denver' date +%Y-%m-%d)
          echo "Run at $(date -u) -- target Field Note date: $day (MT)"
          if [ -f "_field_notes/${day}-field-note.md" ]; then
            echo "A Field Note for $day already exists -- skipping to avoid a duplicate publish."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r scraper/requirements.txt

      - name: Restore database
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: scraper/articles.db
          key: articles-db-${{ github.run_id }}
          restore-keys: articles-db-

      - name: Generate Field Note
        if: steps.gate.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/field_note.py

      - name: Push new Field Note
        id: push
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "itsalreadywhen-bot"
          git config user.email "actions@github.com"
          git add _field_notes/
          if git diff --staged --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Field Note $(TZ='America/Denver' date +'%Y-%m-%d')"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for page to go live
        if: steps.push.outputs.published == 'true'
        run: |
          URL=$(python -c "
          import re, glob
          from pathlib import Path
          notes = sorted(glob.glob('_field_notes/*.md'), reverse=True)
          p = Path(notes[0])
          content = p.read_text()
          date = re.search(r'date:\s*(\d{4}-\d{2}-\d{2})', content).group(1)
          slug = re.sub(r'^\d{4}-\d{2}-\d{2}-', '', p.stem)
          print(f'https://bizzal70.github.io/itsalreadywhen/field-notes/{date.replace(\"-\", \"/\")}/{slug}/')
          ")
          echo "Waiting for $URL"
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$status" = "200" ]; then
              echo "Page is live (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $status, waiting 10s..."
            sleep 10
          done
          echo "Page did not go live after 5 minutes — aborting tweet"
          exit 1

      - name: Post to X
        if: steps.push.outputs.published == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scraper/post_field_note_to_x.py