name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate OG image
        run: |
          mkdir -p assets
          convert -size 1200x630 xc:'#0d1117' -fill '#e05252' -draw "rectangle 0,580 1200,630" -font DejaVu-Sans-Bold -pointsize 80 -fill '#e05252' -gravity North -annotate +0+160 "Its Already When." -font DejaVu-Sans -pointsize 38 -fill '#8b949e' -gravity North -annotate +0+280 "Cybersecurity news for people who know how this ends." assets/og-image.png

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4