<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  <link type="application/atom+xml" rel="alternate" href="{{ '/field-notes-feed.xml' | absolute_url }}" title="{{ site.title | smartify }} — Field Notes" />
  <link type="application/atom+xml" rel="alternate" href="{{ '/rtfm-feed.xml' | absolute_url }}" title="{{ site.title | smartify }} — RTFM" />
  {% seo %}
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
      <div class="site-tagline">{{ site.tagline }}</div>
      <nav>
        <a href="{{ '/' | relative_url }}">Issues</a>
        <a href="{{ '/field-notes/' | relative_url }}">Field Notes</a>
        <a href="{{ '/rtfm/' | relative_url }}">RTFM</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </nav>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>{{ site.title }} &mdash; {{ site.tagline }}</p>
  </footer>
</body>
</html>
